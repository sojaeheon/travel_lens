services:
  ###############################
  # FRONTEND (Vue)
  ###############################
  frontend:
    build: ./front-pjt/travel-front
    container_name: travel-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./front-pjt/travel-front:/app
      - /app/node_modules
    networks:
      - travel-net

  ###############################
  # BACKEND (Django)
  ###############################
  backend:
    build: ./backend-pjt
    container_name: travel-backend
    volumes:
      - ./backend-pjt:/app
      - ./backend-pjt/dummy_data:/data          # ⭐ CSV seed 데이터
    # backend는 db가 켜진 뒤에 실행해야 하므로 dependencies 선언.
    # 완전히 기다리지는 않지만 순서 보장됨
    depends_on:
      db:
        condition: service_started
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_started

    # Django가 DB에 접속할 때 필요한 환경 변수들 전달
    environment:
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      POSTGRES_DB: ${POSTGRES_DB} 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST} # Backend 컨테이너는 DB 컨테이너에 서비스 이름(db)으로 접속함
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "8000:8000"
    networks:
      - travel-net

  ###############################
  # DB (postgre)
  ###############################
  db:
    image: postgres:16
    container_name: travellens-db
    # 컨테이너가 죽어도 자동 재시작 -> 서버 운영 시 매우 중요
    restart: unless-stopped
    environment:
      # 생성할 기본 데이터 베잉스 이름
      POSTGRES_DB: ${POSTGRES_DB}
      # 관리자 계정
      POSTGRES_USER: ${POSTGRES_USER}
      # 비밀번호
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # 타임존 설정(한국 표준시)
      TZ: Asia/Seoul
    # Postgres의 실제 데이터 파일은 /var/lib/postgresql/data에 저장
    # 이를 도커 볼륨(postgres-data)에 연결 -> 컨테이너가 삭제되어도 데이터 유지됨
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # 호스트 PC 포트 5432 -> 컨테이너 포트 5432 연결
    # 로컬 툴(DBeaver, PgAdmin 등)로 접속할 때 필요
    ports:
      - "5432:5432"
    networks:
      - travel-net

  ###############################
  # Zookeeper 
  ###############################
  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - travel-net


  ###############################
  # kafka
  ###############################
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    ports:
      - "9092:9092" # docker 내부용
      - "29092:29092" # docker 외부 (호스트(WSL/Windows)에서 접속)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    depends_on:
      - zookeeper
    networks:
      - travel-net

  ###############################
  # Blog / News Producer & Consumer
  ###############################
  blog-producer:
    build:
      context: .
      dockerfile: ./data-pipeline/Dockerfile.blog
    container_name: blog-producer
    working_dir: /app
    volumes:
      - ./data-pipeline/kafka:/app/scripts
      - ./.env:/app/.env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
    command: ["python", "scripts/producer/travel_blog_producer.py"]
    depends_on:
      - kafka
      - db
    networks:
      - travel-net

  blog-consumer:
    build:
      context: .
      dockerfile: ./data-pipeline/Dockerfile.blog
    container_name: blog-consumer
    working_dir: /app
    volumes:
      - ./data-pipeline/kafka:/app/scripts
      - ./.env:/app/.env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
    command: ["python", "scripts/consumer/travel_blog_consumer.py"]
    depends_on:
      - kafka
      - db
    networks:
      - travel-net

  news-producer:
    build:
      context: .
      dockerfile: ./data-pipeline/Dockerfile.blog
    container_name: news-producer
    working_dir: /app
    volumes:
      - ./data-pipeline/kafka:/app/scripts
      - ./.env:/app/.env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    command: ["python", "scripts/producer/travel_news_producer.py"]
    depends_on:
      - kafka
      - db
    networks:
      - travel-net

  news-consumer:
    build:
      context: .
      dockerfile: ./data-pipeline/Dockerfile.blog
    container_name: news-consumer
    working_dir: /app
    volumes:
      - ./data-pipeline/kafka:/app/scripts
      - ./.env:/app/.env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    command: ["python", "scripts/consumer/travel_news_consumer.py"]
    depends_on:
      - kafka
      - db
    networks:
      - travel-net

  ###############################
  # Flink JobManager
  ###############################
  flink-jobmanager:
    build: ./data-pipeline/flink
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8084:8081"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    volumes:
      - ./data-pipeline/flink/jobs:/jobs
    depends_on:
      - kafka    
    networks:
      - travel-net

  ###############################
  # Flink TaskManager
  ###############################
  flink-taskmanager:
    build: ./data-pipeline/flink
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
      - kafka
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=4
    networks:
      - travel-net

  ####################################
  # Elasticsearch & Logstash & Kibana
  ####################################
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.1
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=travellens-cluster
      - discovery.type=single-node

      # 개발용 보안 OFF
      - xpack.security.enabled=false

      # 메모리
      - ES_JAVA_OPTS=-Xms512m -Xmx512m

      # 외부 접근
      - network.host=0.0.0.0

    ports:
      - "9200:9200"

    volumes:
      # ES 데이터 영속성 (필수)
      - es-data:/usr/share/elasticsearch/data

      # 사용자 사전 (선택)
      - ./config/dictionary:/usr/share/elasticsearch/config/dictionary

    networks:
      - travel-net

    # ⭐⭐⭐ 여기 핵심 추가 ⭐⭐⭐
    command: >
      sh -c "
      if [ ! -d /usr/share/elasticsearch/plugins/analysis-nori ]; then
        elasticsearch-plugin install analysis-nori --batch;
      fi &&
      exec /usr/local/bin/docker-entrypoint.sh elasticsearch
      "

    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.1
    container_name: logstash
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    depends_on:
      elasticsearch:
        condition: service_started
      db:
        condition: service_started
    volumes:
      - ./elasticsearch/pipeline:/usr/share/logstash/pipeline
      - ./elasticsearch/ingest_data:/usr/share/logstash/ingest_data
    ports:
      - "5044:5044"
    networks:
      - travel-net
  
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.1
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - travel-net

  ################################
  # Hadoop & Spark
  ################################
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: unless-stopped
    environment:
      CLUSTER_NAME: test
      CORE_CONF_fs_defaultFS: ${CORE_CONF_fs_defaultFS}
      HDFS_CONF_dfs_webhdfs_enabled: ${HDFS_CONF_dfs_webhdfs_enabled}
      HDFS_CONF_dfs_permissions_enabled: ${HDFS_CONF_dfs_permissions_enabled}
    volumes:
      - namenode_data:/hadoop/dfs/name
    ports:
      - "9870:9870"
    networks:
      - travel-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: unless-stopped
    environment:
      CLUSTER_NAME: test
      CORE_CONF_fs_defaultFS: ${CORE_CONF_fs_defaultFS}
      HDFS_CONF_dfs_webhdfs_enabled: ${HDFS_CONF_dfs_webhdfs_enabled}
      HDFS_CONF_dfs_permissions_enabled: ${HDFS_CONF_dfs_permissions_enabled}
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - travel-net

  spark-master:
    image: bde2020/spark-master:3.0.1-hadoop3.2
    container_name: spark-master
    restart: unless-stopped
    environment:
      INIT_DAEMON_STEP: setup_spark
    ports:
      - "8081:8080"
      - "7077:7077"
    networks:
      - travel-net

  spark-worker:
    image: bde2020/spark-worker:3.0.1-hadoop3.2
    container_name: spark-worker
    restart: unless-stopped
    environment:
      SPARK_MASTER: ${SPARK_MASTER}
      INIT_DAEMON_STEP: setup_spark
    ports:
      - "8082:8081"
    depends_on:
      - spark-master
    networks:
      - travel-net

  ###############################
  # Airflow DB
  ###############################
  airflow-db:
    image: postgres:16
    container_name: airflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    networks:
      - travel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  ###############################
  # Airflow 초기화 (1회)
  ###############################
  airflow-init:
    build:
      context: .
      dockerfile: ./data-pipeline/Dockerfile.airflow
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password airflow
        echo "✅ Airflow initialization complete!"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_CONN_TRAVEL_POSTGRES}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_UID: ${AIRFLOW_UID}
    volumes:
      - ./data-pipeline/airflow/dags:/opt/airflow/dags
      - ./data-pipeline/airflow/logs:/opt/airflow/logs
      - ./data-pipeline/airflow/plugins:/opt/airflow/plugins
      - ./data-pipeline/airflow/scripts:/opt/airflow/scripts
    depends_on:
      airflow-db:
        condition: service_healthy
    networks:
      - travel-net

  ###############################
  # Airflow Webserver
  ###############################
  airflow-webserver:
    build:
      context: .
      dockerfile: ./data-pipeline/Dockerfile.airflow
    container_name: airflow-webserver
    command: webserver
    restart: unless-stopped
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_CONN_TRAVEL_POSTGRES}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_CONN_TRAVEL_POSTGRES: ${AIRFLOW_CONN_TRAVEL_POSTGRES}
      AIRFLOW_CONN_SPARK_DEFAULT: 'spark://spark-master:7077'
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./data-pipeline/airflow/dags:/opt/airflow/dags
      - ./data-pipeline/airflow/logs:/opt/airflow/logs
      - ./data-pipeline/airflow/plugins:/opt/airflow/plugins
      - ./data-pipeline/airflow/scripts:/opt/airflow/scripts
    depends_on:
      db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - travel-net

  ###############################
  # Airflow Scheduler
  ###############################
  airflow-scheduler:
    build:
      context: .
      dockerfile: ./data-pipeline/Dockerfile.airflow
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_CONN_TRAVEL_POSTGRES}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_UID: ${AIRFLOW_UID}
      AIRFLOW_CONN_TRAVEL_POSTGRES: ${AIRFLOW_CONN_TRAVEL_POSTGRES}
      AIRFLOW_CONN_SPARK_DEFAULT: 'spark://spark-master:7077'
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_USER_NAME: airflow
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
    volumes:
      - ./data-pipeline/airflow/dags:/opt/airflow/dags
      - ./data-pipeline/airflow/logs:/opt/airflow/logs
      - ./data-pipeline/airflow/plugins:/opt/airflow/plugins
      - ./data-pipeline/airflow/scripts:/opt/airflow/scripts
      # - ./data-pipeline/hdfs/hadoop_conf:/opt/hadoop/etc/hadoop
      - ./data-pipeline/hdfs:/opt/airflow/hdfs        # ⭐ 이 줄 추가
    depends_on:
      db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - travel-net
  
  # Redis (Chat Message Broker)
  ###############################
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - travel-net

volumes:
  postgres-data:
  es-data:
  namenode_data:
  datanode_data:
  airflow-db-data:

networks:
  travel-net:
    driver: bridge